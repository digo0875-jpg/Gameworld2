<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedra Papel Tesoura - GameWorld</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #050f1e 0%, #071a3d 50%, #0a2463 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 2rem 1rem;
  }

  .back-btn {
    position: fixed;
    top: 1.2rem;
    left: 1.2rem;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 8px 18px;
    border-radius: 30px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
    z-index: 10;
  }
  .back-btn:hover { background: rgba(255,255,255,0.14); }

  h1 {
    font-size: 2rem;
    font-weight: 800;
    color: #ff2e63;
    text-shadow: 0 0 30px rgba(255,46,99,0.4);
    letter-spacing: 0.04em;
    margin-bottom: 1.2rem;
    text-align: center;
  }

  /* Seletor de modo */
  .mode-selector {
    display: flex;
    gap: 10px;
    margin-bottom: 1.2rem;
  }
  .mode-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 30px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: linear-gradient(135deg, #ff2e63, #c4234e);
    border-color: #ff2e63;
    color: #fff;
    box-shadow: 0 4px 16px rgba(255,46,99,0.4);
  }
  .mode-btn:hover:not(.active) { background: rgba(255,255,255,0.12); color: #fff; }

  /* Placar */
  .scoreboard {
    display: flex;
    gap: 12px;
    margin-bottom: 1.2rem;
    width: 100%;
    max-width: 460px;
  }
  .score-card {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 10px 8px;
    text-align: center;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .score-card.win-glow-x { border-color: #ff2e63; box-shadow: 0 0 16px rgba(255,46,99,0.3); }
  .score-card.win-glow-o { border-color: #4a90e2; box-shadow: 0 0 16px rgba(74,144,226,0.3); }
  .score-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 2px; }
  .score-card:nth-child(1) .score-label { color: #ff6a9b; }
  .score-card:nth-child(3) .score-label { color: #6ab4ff; }
  .score-value { font-size: 26px; font-weight: 800; color: #fff; }

  /* Arena */
  .arena {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 1.2rem;
    width: 100%;
    max-width: 460px;
  }
  .player-side { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
  .player-label { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.45); }
  .choice-display {
    width: 100px; height: 100px;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 50px;
    transition: all 0.3s;
  }
  .choice-display.win  { border-color: #ff2e63; background: rgba(255,46,99,0.15); box-shadow: 0 0 20px rgba(255,46,99,0.3); }
  .choice-display.lose { border-color: #4a90e2; background: rgba(74,144,226,0.1); }
  .choice-display.draw { border-color: #ffd700; background: rgba(255,215,0,0.1); }
  .vs-badge { font-size: 18px; font-weight: 800; color: rgba(255,255,255,0.3); flex-shrink: 0; }

  /* Resultado */
  .result-msg {
    font-size: 1.2rem;
    font-weight: 800;
    min-height: 30px;
    text-align: center;
    margin-bottom: 1.1rem;
  }
  .result-msg.ganhou-1 { color: #ff2e63; }
  .result-msg.ganhou-2 { color: #4a90e2; }
  .result-msg.empate   { color: #ffd700; }

  /* ===== MODO 1 JOGADOR ===== */
  #modo-1p .choices {
    display: flex;
    gap: 14px;
    margin-bottom: 1.2rem;
  }

  /* ===== MODO 2 JOGADORES ===== */
  #modo-2p { width: 100%; max-width: 460px; }

  .turn-indicator {
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 20px;
    margin-bottom: 1rem;
    transition: all 0.3s;
  }
  .turn-indicator.t1 { background: rgba(255,46,99,0.15); color: #ff6a9b; border: 1px solid rgba(255,46,99,0.3); }
  .turn-indicator.t2 { background: rgba(74,144,226,0.15); color: #6ab4ff; border: 1px solid rgba(74,144,226,0.3); }
  .turn-indicator.hidden { opacity: 0; }

  /* Ecrã de ocultar escolha (para não ver) */
  .hide-screen {
    background: rgba(5,15,30,0.97);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 24px 20px;
    text-align: center;
    margin-bottom: 1rem;
    display: none;
  }
  .hide-screen.active { display: block; }
  .hide-screen p { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 12px; }
  .hide-screen h3 { font-size: 1rem; font-weight: 800; margin-bottom: 16px; }
  .hide-screen h3 span { color: #ff2e63; }
  .hide-screen h3 span.p2 { color: #4a90e2; }

  .choices-2p {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 0;
  }

  /* Botões de escolha (partilhados) */
  .choice-btn {
    width: 86px; height: 86px;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    font-size: 38px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 3px;
    transition: all 0.15s;
  }
  .choice-btn span.label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    font-family: 'Nunito', sans-serif;
  }
  .choice-btn:hover {
    background: rgba(255,46,99,0.15);
    border-color: #ff2e63;
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 6px 16px rgba(255,46,99,0.3);
  }
  .choice-btn.p2-hover:hover {
    background: rgba(74,144,226,0.15);
    border-color: #4a90e2;
    box-shadow: 0 6px 16px rgba(74,144,226,0.3);
  }
  .choice-btn:active { transform: scale(0.96); }
  .choice-btn.chosen { opacity: 0.5; pointer-events: none; }

  /* Botão confirmação J2 */
  #reveal-btn {
    display: none;
    margin: 0 auto 1rem;
    background: linear-gradient(135deg, #4a90e2, #2563c4);
    box-shadow: 0 4px 20px rgba(74,144,226,0.35);
  }
  #reveal-btn.visible { display: block; }

  /* Botões gerais */
  .btn {
    background: linear-gradient(135deg, #ff2e63, #c4234e);
    color: #fff;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 800;
    padding: 11px 36px;
    border-radius: 30px;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(255,46,99,0.35);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,46,99,0.5); }
  .btn:active { transform: scale(0.97); }

  /* Histórico */
  .history {
    display: flex;
    gap: 5px;
    margin-top: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 460px;
  }
  .hist-item {
    width: 26px; height: 26px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .hist-item.w { background: rgba(255,46,99,0.3); }
  .hist-item.l { background: rgba(74,144,226,0.3); }
  .hist-item.d { background: rgba(255,215,0,0.2); }

  @keyframes pop {
    0%   { transform: scale(0.5); opacity: 0; }
    70%  { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop { animation: pop 0.3s ease-out forwards; }

  @keyframes shake {
    0%,100% { transform: rotate(0deg); }
    25%      { transform: rotate(-12deg); }
    75%      { transform: rotate(12deg); }
  }
  .shaking { animation: shake 0.15s ease-in-out 4; }
</style>
</head>
<body>

<a class="back-btn" href="javascript:history.back()">&#8592; Voltar</a>

<h1>Pedra Papel Tesoura</h1>

<!-- Seletor de modo -->
<div class="mode-selector">
  <button class="mode-btn active" id="btn-1p" onclick="setModo(1)">🤖 vs PC</button>
  <button class="mode-btn"        id="btn-2p" onclick="setModo(2)">👥 2 Jogadores</button>
</div>

<!-- Placar -->
<div class="scoreboard">
  <div class="score-card" id="card-e1">
    <div class="score-label" id="label-e1">Tu</div>
    <div class="score-value" id="score-e1">0</div>
  </div>
  <div class="score-card">
    <div class="score-label">Empates</div>
    <div class="score-value" id="score-emp">0</div>
  </div>
  <div class="score-card" id="card-e2">
    <div class="score-label" id="label-e2">PC</div>
    <div class="score-value" id="score-e2">0</div>
  </div>
</div>

<!-- Arena -->
<div class="arena">
  <div class="player-side">
    <div class="player-label" id="arena-label-1">Tu</div>
    <div class="choice-display" id="display-1">❓</div>
  </div>
  <div class="vs-badge">VS</div>
  <div class="player-side">
    <div class="player-label" id="arena-label-2">PC</div>
    <div class="choice-display" id="display-2">❓</div>
  </div>
</div>

<!-- Resultado -->
<div class="result-msg" id="result">Escolhe a tua jogada!</div>

<!-- MODO 1 JOGADOR -->
<div id="modo-1p">
  <div class="choices">
    <button class="choice-btn" onclick="jogar1p('pedra')">🪨<span class="label">Pedra</span></button>
    <button class="choice-btn" onclick="jogar1p('papel')">📄<span class="label">Papel</span></button>
    <button class="choice-btn" onclick="jogar1p('tesoura')">✂️<span class="label">Tesoura</span></button>
  </div>
</div>

<!-- MODO 2 JOGADORES -->
<div id="modo-2p" style="display:none;">

  <div class="turn-indicator t1" id="turn-indicator">🎮 Vez do Jogador 1 — escolhe em segredo!</div>

  <!-- Ecrã tapado para J1 -->
  <div class="hide-screen active" id="screen-j1">
    <h3>Jogador <span>1</span> — escolhe a tua jogada:</h3>
    <p>O Jogador 2 não deve ver o ecrã!</p>
    <div class="choices-2p">
      <button class="choice-btn" onclick="escolher2p(1,'pedra')">🪨<span class="label">Pedra</span></button>
      <button class="choice-btn" onclick="escolher2p(1,'papel')">📄<span class="label">Papel</span></button>
      <button class="choice-btn" onclick="escolher2p(1,'tesoura')">✂️<span class="label">Tesoura</span></button>
    </div>
  </div>

  <!-- Ecrã tapado para J2 -->
  <div class="hide-screen" id="screen-j2">
    <h3>Jogador <span class="p2">2</span> — escolhe a tua jogada:</h3>
    <p>O Jogador 1 já escolheu. Agora é a tua vez!</p>
    <div class="choices-2p">
      <button class="choice-btn p2-hover" onclick="escolher2p(2,'pedra')">🪨<span class="label">Pedra</span></button>
      <button class="choice-btn p2-hover" onclick="escolher2p(2,'papel')">📄<span class="label">Papel</span></button>
      <button class="choice-btn p2-hover" onclick="escolher2p(2,'tesoura')">✂️<span class="label">Tesoura</span></button>
    </div>
  </div>

</div>

<button class="btn" id="reset-btn" onclick="resetar()">Reiniciar</button>

<!-- Histórico -->
<div class="history" id="history"></div>

<script>
const emojis = { pedra: '🪨', papel: '📄', tesoura: '✂️' };
const opcoes = ['pedra', 'papel', 'tesoura'];
let scores = { e1: 0, e2: 0, emp: 0 };
let historico = [];
let modo = 1;
let jogando = false;
let escolhaJ1 = null;

function setModo(m) {
  modo = m;
  document.getElementById('btn-1p').classList.toggle('active', m === 1);
  document.getElementById('btn-2p').classList.toggle('active', m === 2);
  document.getElementById('modo-1p').style.display = m === 1 ? '' : 'none';
  document.getElementById('modo-2p').style.display = m === 2 ? '' : 'none';
  document.getElementById('label-e1').textContent = m === 1 ? 'Tu' : 'Jogador 1';
  document.getElementById('label-e2').textContent = m === 1 ? 'PC' : 'Jogador 2';
  document.getElementById('arena-label-1').textContent = m === 1 ? 'Tu' : 'Jogador 1';
  document.getElementById('arena-label-2').textContent = m === 1 ? 'PC' : 'Jogador 2';
  resetar();
}

/* ========== MODO 1 JOGADOR ========== */
function jogar1p(escolha) {
  if (jogando) return;
  jogando = true;

  resetDisplays();
  document.getElementById('display-1').textContent = '⏳';
  document.getElementById('display-2').textContent = '⏳';
  document.getElementById('result').textContent = 'PC a pensar...';
  document.getElementById('result').className = 'result-msg';

  let count = 0;
  const d2 = document.getElementById('display-2');
  const interval = setInterval(() => {
    d2.textContent = emojis[opcoes[Math.floor(Math.random() * 3)]];
    count++;
    if (count >= 6) {
      clearInterval(interval);
      const pc = opcoes[Math.floor(Math.random() * 3)];
      revelar(escolha, pc);
    }
  }, 120);
}

/* ========== MODO 2 JOGADORES ========== */
function escolher2p(jogador, escolha) {
  if (jogador === 1) {
    escolhaJ1 = escolha;
    // Ocultar ecrã J1, mostrar ecrã J2
    document.getElementById('screen-j1').classList.remove('active');
    document.getElementById('screen-j2').classList.add('active');
    document.getElementById('turn-indicator').textContent = '🎮 Vez do Jogador 2 — escolhe em segredo!';
    document.getElementById('turn-indicator').className = 'turn-indicator t2';
  } else {
    const escolhaJ2 = escolha;
    document.getElementById('screen-j2').classList.remove('active');
    document.getElementById('turn-indicator').classList.add('hidden');
    resetDisplays();
    revelar(escolhaJ1, escolhaJ2);
    escolhaJ1 = null;
  }
}

/* ========== REVELAR RESULTADO ========== */
function revelar(e1, e2) {
  const res = resultado(e1, e2);
  const d1 = document.getElementById('display-1');
  const d2 = document.getElementById('display-2');
  const resultEl = document.getElementById('result');

  d1.textContent = emojis[e1];
  d2.textContent = emojis[e2];
  d1.classList.add('pop');
  d2.classList.add('pop');

  const nome1 = modo === 1 ? 'Tu' : 'Jogador 1';
  const nome2 = modo === 1 ? 'O PC' : 'Jogador 2';

  if (res === 'ganhou') {
    d1.classList.add('win'); d2.classList.add('lose');
    resultEl.textContent = `🎉 ${nome1} ganhou!`;
    resultEl.className = 'result-msg ganhou-1';
    scores.e1++;
    document.getElementById('card-e1').classList.add('win-glow-x');
    document.getElementById('card-e2').classList.remove('win-glow-o');
    historico.push('w');
  } else if (res === 'perdeu') {
    d1.classList.add('lose'); d2.classList.add('win');
    resultEl.textContent = `🎉 ${nome2} ganhou!`;
    resultEl.className = 'result-msg ganhou-2';
    scores.e2++;
    document.getElementById('card-e2').classList.add('win-glow-o');
    document.getElementById('card-e1').classList.remove('win-glow-x');
    historico.push('l');
  } else {
    d1.classList.add('draw'); d2.classList.add('draw');
    resultEl.textContent = '🤝 Empate!';
    resultEl.className = 'result-msg empate';
    scores.emp++;
    document.getElementById('card-e1').classList.remove('win-glow-x');
    document.getElementById('card-e2').classList.remove('win-glow-o');
    historico.push('d');
  }

  document.getElementById('score-e1').textContent  = scores.e1;
  document.getElementById('score-e2').textContent  = scores.e2;
  document.getElementById('score-emp').textContent = scores.emp;
  atualizarHistorico();

  // No modo 2p, mostrar botão "nova ronda" implicitamente via reset
  if (modo === 2) {
    setTimeout(() => {
      document.getElementById('screen-j1').classList.add('active');
      document.getElementById('turn-indicator').textContent = '🎮 Vez do Jogador 1 — escolhe em segredo!';
      document.getElementById('turn-indicator').className = 'turn-indicator t1';
    }, 2000);
  }

  jogando = false;
}

function resultado(e1, e2) {
  if (e1 === e2) return 'empate';
  if (
    (e1 === 'pedra'   && e2 === 'tesoura') ||
    (e1 === 'papel'   && e2 === 'pedra')   ||
    (e1 === 'tesoura' && e2 === 'papel')
  ) return 'ganhou';
  return 'perdeu';
}

function resetDisplays() {
  ['display-1','display-2'].forEach(id => {
    const el = document.getElementById(id);
    el.className = 'choice-display';
    el.textContent = '❓';
  });
  document.getElementById('card-e1').classList.remove('win-glow-x');
  document.getElementById('card-e2').classList.remove('win-glow-o');
}

function atualizarHistorico() {
  document.getElementById('history').innerHTML = historico.slice(-20).map(r => {
    const emoji = r === 'w' ? '✅' : r === 'l' ? '❌' : '🟡';
    return `<div class="hist-item ${r}">${emoji}</div>`;
  }).join('');
}

function resetar() {
  scores = { e1: 0, e2: 0, emp: 0 };
  historico = [];
  escolhaJ1 = null;
  jogando = false;
  ['score-e1','score-e2','score-emp'].forEach(id => document.getElementById(id).textContent = 0);
  resetDisplays();
  document.getElementById('result').textContent = 'Escolhe a tua jogada!';
  document.getElementById('result').className = 'result-msg';
  document.getElementById('history').innerHTML = '';

  if (modo === 2) {
    document.getElementById('screen-j1').classList.add('active');
    document.getElementById('screen-j2').classList.remove('active');
    document.getElementById('turn-indicator').textContent = '🎮 Vez do Jogador 1 — escolhe em segredo!';
    document.getElementById('turn-indicator').className = 'turn-indicator t1';
  }
}
</script>
</body>
</html>
